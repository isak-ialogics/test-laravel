version: "3.8"

networks:
  traefik-public:
    external: true
  internal:
    driver: overlay

services:
  app:
    image: ghcr.io/isak-ialogics/test-laravel-app:latest
    networks:
      - internal
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      APP_KEY: base64:REPLACE_ME

  web:
    image: ghcr.io/isak-ialogics/test-laravel-web:latest
    networks:
      - internal
      - traefik-public
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.http.routers.laravel.rule=Host(`laravel-test.kartrak.co.za`)
        - traefik.http.routers.laravel.entrypoints=websecure
        - traefik.http.routers.laravel.tls=true
        - traefik.http.routers.laravel.tls.certresolver=le
        - traefik.http.services.laravel.loadbalancer.server.port=80

        - traefik.http.routers.laravel-http.rule=Host(`laravel-test.kartrak.co.za`)
        - traefik.http.routers.laravel-http.entrypoints=web
        - traefik.http.routers.laravel-http.middlewares=laravel-redirect
        - traefik.http.routers.laravel-http.service=noop@internal
        - traefik.http.middlewares.laravel-redirect.redirectscheme.scheme=https
